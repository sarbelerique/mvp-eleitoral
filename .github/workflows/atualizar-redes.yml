name: Atualizar redes sociais

on:
  # NOTA: o Instagram bloqueia IPs de datacenter (como os do GitHub Actions),
  # então este workflow falha na nuvem. A automação gratuita que FUNCIONA roda
  # na máquina local (IP residencial) — veja atualizar_e_enviar.ps1.
  # Mantido só para acionamento manual (ex.: se um dia usarmos proxy/API).
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests

      - name: Atualizar seguidores
        run: python atualizar_redes.py

      - name: Commitar se houver mudança
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/redes.csv data/redes_atualizado.txt
          if git diff --cached --quiet; then
            echo "Nada mudou."
          else
            git commit -m "Atualiza seguidores automaticamente ($(date +%d/%m/%Y))"
            git push
          fi
